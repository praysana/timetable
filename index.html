    //시간표 불러오기
    function changeClass(className) {
    localStorage.setItem("selectedClass", className);

  const studentSelect = document.getElementById("studentSelect");
  studentSelect.innerHTML = '<option value="">번호 선택</option>';

  if (!classes[className]) {
    showTimetable(null);
    return;
  }

  const students = Object.keys(classes[className]);

  students.forEach(num => {
    let option = document.createElement("option");
    option.value = num;
    option.textContent = num + "번";
    studentSelect.appendChild(option);
  });
    showTimetable(null);
}
        function selectStudent(num) {
  const className = document.getElementById("classSelect").value;

  localStorage.setItem("selectedStudent", num);

  if (!classes[className] || !classes[className][num]) return;

  showTimetable(classes[className][num]);
}        
    function showTimetable(studentData) {
    const table = document.getElementById("timetable");
    const className = document.getElementById("classSelect").value;

  // 반 안 선택했으면 "표만" 보여주기
  if (!className) {
  table.innerHTML = `
    <tr>
      <th></th>
      <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
    </tr>
  `;

  for (let i = 0; i < 7; i++) {
    let row = table.insertRow();
    row.insertCell().innerText = (i + 1) + "교시";

    for (let j = 0; j < 5; j++) {
      row.insertCell().innerText = "";
    }
  }

  return;
}

  const base = baseTimetables[className];
  if (!base) return;

  table.innerHTML = `
    <tr>
      <th></th>
      <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
    </tr>
  `;

  for (let i = 0; i < 7; i++) {
    let row = table.insertRow();
    row.insertCell().innerText = (i + 1) + "교시";

    for (let j = 0; j < 5; j++) {
      let cell = row.insertCell();

    let raw = base[j][i] || ""; //원래 값(A/B/C 확인용)
    let value = studentData ? (studentData[raw] || raw) : raw;
    
    //기본 텍스트
    cell.innerText = value;
    
    //선택과목이면 색 넣기
    if (raw === "A" || raw === "B" || raw === "C") {
      cell.style.backgroundColor = "#fdf7cd";
    }
    }
  }
}

    

        
window.onload = function() {
  showTimetable(null);  
    
  const savedClass = localStorage.getItem("selectedClass");
  const savedStudent = localStorage.getItem("selectedStudent");

  if (savedClass) {
    document.getElementById("classSelect").value = savedClass;
    changeClass(savedClass);

    setTimeout(() => {
      if (savedStudent) {
        document.getElementById("studentSelect").value = savedStudent;
        selectStudent(savedStudent);
      }
    }, 0);
  }
};
